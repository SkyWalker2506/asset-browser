<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedievalFactory — Asset Browser</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1510; color: #e8dcc0;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(180deg, #2a1f15 0%, #1a1510 100%);
    padding: 16px 24px; border-bottom: 2px solid #8b6b3d;
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
  }
  h1 { margin: 0; font-size: 22px; color: #d4a849; }
  .meta { color: #8b6b3d; font-size: 13px; }
  .controls { flex: 1; display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
  input, select {
    background: #0f0b07; color: #e8dcc0; border: 1px solid #5c4428;
    padding: 8px 12px; border-radius: 4px; font-size: 14px;
  }
  input { min-width: 220px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 24px; background: #110d08; border-bottom: 1px solid #3a2d1d; }
  .chip {
    padding: 5px 12px; border-radius: 16px; background: #2a1f15; border: 1px solid #5c4428;
    cursor: pointer; font-size: 12px; color: #c9b889; user-select: none; transition: all .15s;
  }
  .chip:hover { border-color: #d4a849; }
  .chip.active { background: #d4a849; color: #1a1510; border-color: #d4a849; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; padding: 16px 24px;
  }
  .card {
    background: #0f0b07; border: 1px solid #3a2d1d; border-radius: 6px;
    overflow: hidden; cursor: pointer; transition: transform .15s, border-color .15s;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-2px); border-color: #d4a849; }
  .thumb {
    aspect-ratio: 1; background:
      linear-gradient(45deg, #1a1510 25%, transparent 25%),
      linear-gradient(-45deg, #1a1510 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1510 75%),
      linear-gradient(-45deg, transparent 75%, #1a1510 75%);
    background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    background-color: #2a1f15;
    display: flex; align-items: center; justify-content: center; padding: 8px;
  }
  .thumb img { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: -webkit-optimize-contrast; }
  .anim-frame {
    width: 128px; height: 128px; background-repeat: no-repeat; background-size: auto 100%;
    image-rendering: -webkit-optimize-contrast;
  }
  @keyframes sprite-play {
    to { background-position-x: var(--end); }
  }
  .info { padding: 8px 10px; font-size: 12px; }
  .info .n { color: #e8dcc0; font-weight: 600; word-break: break-word; }
  .info .d { color: #8b6b3d; font-size: 10px; margin-top: 2px; display: flex; justify-content: space-between; }
  .tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 8px; background: #3a2d1d; color: #c9b889; margin-top: 4px; }
  .dl {
    display: block; margin-top: 8px; text-align: center; background: #5c4428; color: #e8dcc0;
    text-decoration: none; padding: 6px; border-radius: 4px; font-size: 11px; font-weight: 600;
    transition: background .15s;
  }
  .dl:hover { background: #d4a849; color: #1a1510; }
  .modal .dl { margin-top: 12px; padding: 10px; font-size: 13px; }
  /* modal */
  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 24px;
  }
  .modal.open { display: flex; }
  .modal .box {
    background: #1a1510; border: 2px solid #d4a849; border-radius: 8px;
    max-width: 90vw; max-height: 90vh; overflow: auto; padding: 20px;
    display: grid; grid-template-columns: 1fr auto; gap: 20px;
  }
  .modal .preview {
    min-width: 400px; min-height: 400px; max-width: 60vw; max-height: 80vh;
    background-color: #2a1f15;
    background-image:
      linear-gradient(45deg, #1a1510 25%, transparent 25%),
      linear-gradient(-45deg, #1a1510 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1510 75%),
      linear-gradient(-45deg, transparent 75%, #1a1510 75%);
    background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal .preview img { max-width: 100%; max-height: 100%; }
  .modal .details { min-width: 240px; font-size: 13px; }
  .modal .details h2 { margin: 0 0 12px; color: #d4a849; font-size: 16px; word-break: break-word; }
  .modal .details .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #3a2d1d; }
  .modal .details .row .k { color: #8b6b3d; }
  .modal .close { position: absolute; top: 16px; right: 24px; font-size: 28px; color: #d4a849; cursor: pointer; background: none; border: none; }
  .empty { text-align: center; padding: 60px; color: #8b6b3d; }
  .tab { background: #2a1f15; border: 1px solid #5c4428; color: #c9b889; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .tab:hover { border-color: #d4a849; }
  .tab.active { background: #d4a849; color: #1a1510; border-color: #d4a849; }
  .miss { background:#0f0b07; border:1px solid #3a2d1d; border-radius:6px; padding:14px; }
  .miss h3 { margin:0 0 8px; color:#e8dcc0; font-size:14px; }
  .miss .meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .miss .notes { font-size:12px; color:#c9b889; line-height:1.5; margin-bottom:8px; }
  .miss .prompt { font-size:11px; color:#8b6b3d; background:#0f0b07; border:1px solid #3a2d1d; border-radius:4px; padding:8px; max-height:80px; overflow:auto; font-family:ui-monospace,Menlo,monospace; white-space:pre-wrap; margin-bottom:8px; }
  .miss .actions { display:flex; gap:6px; flex-wrap:wrap; }
  .miss .btn { flex:1; min-width:100px; padding:7px 10px; border-radius:4px; border:1px solid #5c4428; background:#2a1f15; color:#e8dcc0; font-size:11px; cursor:pointer; text-align:center; font-weight:600; }
  .miss .btn:hover { border-color:#d4a849; background:#3a2d1d; }
  .miss .btn.primary { background:#5c4428; }
  .miss .btn.primary:hover { background:#d4a849; color:#1a1510; }
  .miss .btn.danger { background:#4d1f1f; border-color:#7a1f1f; }
  .miss .btn.danger:hover { background:#7a1f1f; }
  .miss .preview { margin:8px 0; padding:8px; background:#2a1f15; border:1px dashed #5c4428; border-radius:4px; display:flex; align-items:center; gap:8px; }
  .miss .preview img { max-height:64px; max-width:128px; }
  .up-preview { margin:10px 0; padding:10px; background:
    linear-gradient(45deg, #1a1510 25%, transparent 25%),
    linear-gradient(-45deg, #1a1510 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1a1510 75%),
    linear-gradient(-45deg, transparent 75%, #1a1510 75%); background-color: #2a1f15;
    background-size: 16px 16px; background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    border:1px solid #5c4428; border-radius:4px; text-align:center; }
  .up-preview img { max-width:100%; max-height:280px; object-fit:contain; cursor:zoom-in; }
  .up-info { margin-top:8px; }
  .up-name { font-size:12px; color:#e8dcc0; word-break:break-all; font-weight:600; }
  .up-meta { font-size:11px; color:#8b6b3d; margin-top:2px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#2a1f15; color:#e8dcc0; padding:10px 18px; border-radius:6px; border:1px solid #d4a849; z-index:200; font-size:13px; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
  .pri-P0 { background:#7a1f1f; color:#fff; }
  .pri-P1 { background:#7a4a1f; color:#fff; }
  .pri-P2 { background:#3a2d1d; color:#c9b889; }
  .st-todo { background:#3a2d1d; color:#8b6b3d; }
  .st-in-progress { background:#2a4d7a; color:#fff; }
  .st-waiting-for-review { background:#7a6a1f; color:#fff; }
  .st-denied { background:#7a1f1f; color:#fff; }
  .st-approved, .st-done { background:#2a5a2a; color:#fff; }
  .st-blocked { background:#4d2a2a; color:#fff; }
  .deny-reason { margin:8px 0; padding:8px 10px; background:#2a0f0f; border-left:3px solid #c94d4d; color:#f4c0c0; font-size:12px; border-radius:4px; }
</style>
</head>
<body>
<header>
  <h1>MedievalFactory — Asset Browser</h1>
  <span class="meta" id="meta">loading…</span>
  <div class="tabs" style="display:flex;gap:6px;flex-wrap:wrap;">
    <button class="tab active" data-tab="have">Mevcut</button>
    <button class="tab" data-tab="todo">Eksik</button>
    <button class="tab" data-tab="waiting">Bekleyen</button>
    <button class="tab" data-tab="denied">Reddedilen</button>
    <button class="tab" data-tab="trash" id="trash-tab" style="display:none;">Çöp</button>
  </div>
  <div class="controls">
    <input id="q" placeholder="Ara (isim)…">
    <select id="type">
      <option value="">Tüm tipler</option>
      <option value="Resim">Resim</option>
      <option value="Animasyon">Animasyon</option>
    </select>
    <select id="cat">
      <option value="">Tüm kategoriler</option>
    </select>
    <select id="ext">
      <option value="">Tüm formatlar</option>
    </select>
  </div>
</header>
<div class="chips" id="chips"></div>
<div class="grid" id="grid"></div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <button class="close" onclick="closeModal()">×</button>
  <div class="box" id="box"></div>
</div>
<script>
let data = { items: [] };
let missing = { items: [] };
let config = null;
let lastAction = null; // for undo

function sourceDirFor(item) {
  if (!config) return '';
  const src = item.src || '';
  const tag = src.split('/')[2];
  const s = (config.sources || []).find(x => x.tag === tag);
  return s ? s.dir : '';
}
let tab = 'have';
let filter = { q: '', cat: '', ext: '', kind: '', type: '' };

async function load() {
  const [r, m, c] = await Promise.all([
    fetch('./manifest.json?' + Date.now()).then(x => x.json()),
    fetch('/api/missing?' + Date.now()).then(x => x.json()).catch(() => fetch('./missing.json').then(x => x.json())).catch(() => ({ items: [] })),
    fetch('./config.json').then(x => x.json()).catch(() => null),
  ]);
  data = r; missing = m; config = c;
  updateTabVisibility();
  // probe trash count (public endpoint)
  fetch('/api/trash').then(x => x.json()).then(t => {
    const count = (t.files || []).filter(f => !f.name.endsWith('.meta.json')).length;
    document.getElementById('trash-tab').style.display = count ? '' : 'none';
  }).catch(() => {});
  updateMeta();
  buildChips();
  buildCatSelect();
  render();
}

const STATUS_FOR_TAB = {
  todo: s => s === 'todo' || s === 'in-progress',
  waiting: s => s === 'waiting-for-review',
  denied: s => s === 'denied',
};

// Build synthetic manifest entries for approved items so they show up in "Mevcut"
function approvedAsAssets() {
  return missing.items.filter(i => i.status === 'approved' && i.uploadedFile).map(i => ({
    id: `approved-${i.name}`,
    name: i.name,
    file: i.uploadedFile,
    ext: (i.uploadedFile.split('.').pop() || 'png').toLowerCase(),
    src: `/api/uploaded?file=${encodeURIComponent(i.uploadedFile)}`,
    category: i.category || 'Approved',
    kind: i.kind || 'Other',
    type: i.type || 'Resim',
    size: 0,
    dim: '',
    mtime: new Date().toISOString(),
    _approved: true,
  }));
}

function itemsForTab() {
  if (tab === 'have') {
    // Merge approved (non-manifest) items; dedupe by name — prefer real manifest entry
    const existing = new Set(data.items.map(i => i.name));
    const extras = approvedAsAssets().filter(a => !existing.has(a.name));
    return [...data.items, ...extras];
  }
  const fn = STATUS_FOR_TAB[tab];
  return missing.items.filter(i => fn(i.status));
}

function updateTabVisibility() {
  for (const k of ['waiting', 'denied']) {
    const count = missing.items.filter(i => STATUS_FOR_TAB[k](i.status)).length;
    const btn = document.querySelector(`.tab[data-tab="${k}"]`);
    if (btn) btn.style.display = count ? '' : 'none';
  }
  // If current tab just got hidden, fall back to Mevcut
  const activeBtn = document.querySelector('.tab.active');
  if (activeBtn && activeBtn.style.display === 'none') {
    document.querySelector('.tab[data-tab="have"]').click();
  }
}

function updateMeta() {
  const el = document.getElementById('meta');
  if (tab === 'have') el.textContent = `${data.count} asset · updated ${new Date(data.generated).toLocaleString()}`;
  else {
    const count = itemsForTab().length;
    const label = { todo: 'eksik', waiting: 'bekleyen', approved: 'onaylı', denied: 'reddedilen' }[tab];
    el.textContent = `${count} ${label} · updated ${missing.updated || '—'}`;
  }
}

function buildCatSelect() {
  fillSelect('cat', [...new Set(data.items.map(i => i.category))].sort());
  fillSelect('ext', [...new Set(data.items.map(i => i.ext))].sort().map(e => e.toUpperCase()));
}
function fillSelect(id, values) {
  const sel = document.getElementById(id);
  values.forEach(v => {
    if ([...sel.options].some(o => o.value.toLowerCase() === String(v).toLowerCase())) return;
    const o = document.createElement('option');
    o.value = id === 'ext' ? String(v).toLowerCase() : v;
    o.textContent = v;
    sel.appendChild(o);
  });
}

function buildChips() {
  const kinds = [...new Set(data.items.map(i => i.kind))].sort();
  const c = document.getElementById('chips');
  c.innerHTML = '';
  const all = chip('Tümü', ''); all.classList.add('active');
  all.onclick = () => { filter.kind = ''; activateChip(all); render(); };
  c.appendChild(all);
  kinds.forEach(k => {
    const ch = chip(`${k} (${data.items.filter(i => i.kind === k).length})`, k);
    ch.onclick = () => { filter.kind = k; activateChip(ch); render(); };
    c.appendChild(ch);
  });
}

function chip(label, value) {
  const e = document.createElement('div');
  e.className = 'chip'; e.textContent = label; e.dataset.v = value;
  return e;
}

function activateChip(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function render() {
  const g = document.getElementById('grid');
  const q = filter.q.toLowerCase();
  if (tab !== 'have') {
    const src = itemsForTab();
    const filtered = src.filter(i =>
      (!q || i.name.toLowerCase().includes(q)) &&
      (!filter.kind || i.kind === filter.kind) &&
      (!filter.type || i.type === filter.type)
    );
    if (!filtered.length) { g.innerHTML = `<div class="empty">Liste boş.</div>`; return; }
    g.innerHTML = filtered.map(i => {
      const preview = i.uploadedFile
        ? `<div class="up-preview"><img src="/api/uploaded?file=${encodeURIComponent(i.uploadedFile)}&t=${Date.now()}" onload="this.nextElementSibling.querySelector('.dim').textContent=this.naturalWidth+'x'+this.naturalHeight" onerror="this.style.display='none';this.parentElement.querySelector('.err').style.display='block'"><div class="up-info"><div class="up-name">${i.uploadedFile}</div><div class="up-meta"><span class="dim">—</span> · ham yüklenmiş (işlenmemiş)</div><div class="err" style="display:none;color:#c94d4d;font-size:11px;">Preview yüklenemedi</div></div></div>` : '';
      const deny = i.status === 'denied' && i.denyReason ? `<div class="deny-reason"><b>Reddedildi:</b> ${escapeHtml(i.denyReason)}</div>` : '';
      const actions = [];
      const qn = JSON.stringify(i.name).replace(/"/g, '&quot;');
      if (i.prompt && (i.status === 'todo' || i.status === 'in-progress' || i.status === 'denied')) actions.push(`<button class="btn primary" onclick="copyPrompt(${qn})">Prompt Kopyala</button>`);
      if (i.status === 'todo' || i.status === 'in-progress' || i.status === 'denied') actions.push(`<button class="btn" onclick="uploadFor(${qn})">Upload</button>`);
      if (i.status === 'waiting-for-review') {
        actions.push(`<button class="btn primary" onclick="reviewAction(${qn},'approve')">Onayla</button>`);
        actions.push(`<button class="btn danger" onclick="reviewAction(${qn},'deny')">Reddet</button>`);
        actions.push(`<button class="btn" onclick="deleteUpload(${qn})">Sil</button>`);
      }
      if (i.status === 'approved') {
        actions.push(`<button class="btn primary" onclick="jumpToAsset(${qn})">Assete Git</button>`);
        actions.push(`<button class="btn" onclick="clearEntry(${qn})">Temizle</button>`);
        actions.push(`<button class="btn danger" onclick="reviewAction(${qn},'deny')">Reddet</button>`);
      }
      if (i.status === 'denied') {
        actions.push(`<button class="btn primary" onclick="reviewAction(${qn},'approve')">Onayla</button>`);
        actions.push(`<button class="btn" onclick="reviewAction(${qn},'reopen')">İncelemeye Al</button>`);
        actions.push(`<button class="btn danger" onclick="deleteUpload(${qn})">Sil</button>`);
      }
      if (i.uploadedFile) actions.push(`<a class="btn" href="/api/uploaded?file=${encodeURIComponent(i.uploadedFile)}" download="${i.uploadedFile}">İndir</a>`);
      return `
      <div class="miss" id="miss-${cssEsc(i.name)}">
        <h3>${i.name}</h3>
        <div class="meta">
          <span class="tag pri-${i.priority}">${i.priority}</span>
          <span class="tag st-${i.status}">${i.status}</span>
          <span class="tag">${i.kind}</span>
          <span class="tag" style="background:${i.type==='Animasyon'?'#8b4d1e':'#3a2d1d'}">${i.type}</span>
        </div>
        <div class="notes">${i.notes || ''}</div>
        ${deny}
        ${preview}
        ${i.prompt && (i.status!=='approved') ? `<div class="prompt">${escapeHtml(i.prompt)}</div>` : ''}
        <div class="actions">${actions.join('')}</div>
      </div>`;
    }).join('');
    return;
  }
  const haveItems = itemsForTab();
  const filtered = haveItems.filter(i =>
    (!q || i.name.toLowerCase().includes(q)) &&
    (!filter.cat || i.category === filter.cat) &&
    (!filter.ext || i.ext === filter.ext) &&
    (!filter.kind || i.kind === filter.kind) &&
    (!filter.type || i.type === filter.type)
  );
  if (!filtered.length) { g.innerHTML = '<div class="empty">Eşleşen asset yok.</div>'; return; }
  g.innerHTML = filtered.map(i => {
    let thumbInner = `<img loading="lazy" src="${i.src}" alt="${i.name}">`;
    // Animation playback: if strip with N frames (dim like "WxH" where W = H*N)
    if (i.type === 'Animasyon' && i.dim) {
      const m = i.dim.match(/^(\d+)x(\d+)$/);
      const nameFrames = (i.name.match(/_(\d+)f/i) || [])[1];
      if (m) {
        const w = +m[1], h = +m[2];
        const frames = nameFrames ? +nameFrames : (w > h ? Math.round(w / h) : 1);
        if (frames > 1 && w / h === frames) {
          const endX = -((frames - 1) * 128);
          const dur = (frames / 8).toFixed(2);
          thumbInner = `<div class="anim-frame" style="background-image:url('${i.src}');--end:${endX}px;animation:sprite-play ${dur}s steps(${frames - 1}) infinite;"></div>`;
        }
      }
    }
    const approvedBadge = i._approved ? `<span class="tag st-approved">Onaylı</span> ` : '';
    const delBtn = i._approved
      ? `<button class="dl" style="background:#4d1f1f;border:none;cursor:pointer;" onclick="event.stopPropagation();unapproveAsset(${JSON.stringify(i.name).replace(/"/g,'&quot;')})">Sil (Eksikler'e gönder)</button>`
      : `<button class="dl" style="background:#4d1f1f;border:none;cursor:pointer;" onclick="event.stopPropagation();deleteAsset(${JSON.stringify(i.file).replace(/"/g,'&quot;')},${JSON.stringify(sourceDirFor(i)).replace(/"/g,'&quot;')})">Sil</button>`;
    return `
    <div class="card" id="asset-${cssEsc(i.name)}">
      <div class="thumb" onclick="openModal('${i.id}')">${thumbInner}</div>
      <div class="info">
        <div class="n">${i.name}</div>
        <div class="d"><span>${i.dim || '—'}</span><span>${fmtSize(i.size)}</span></div>
        ${approvedBadge}<span class="tag">${i.kind}</span> <span class="tag" style="background:${i.type==='Animasyon'?'#8b4d1e':'#3a2d1d'}">${i.type}</span>
        <a class="dl" href="${i.src}" download="${i.file}" onclick="event.stopPropagation()">İndir</a>
        ${delBtn}
      </div>
    </div>`;
  }).join('');
}

async function unapproveAsset(name) {
  if (!confirm(`${name} — silinsin mi? Eksikler listesine geri dönecek.`)) return;
  try {
    const r = await fetch('/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'delete failed');
    const prev = missing.items.find(i => i.name === name);
    if (prev?.uploadedFile) recordAction({ type: 'upload-delete', file: prev.uploadedFile, itemName: prev.name, prevStatus: prev.status, prevDenyReason: prev.denyReason, label: 'silme' });
    toast('Eksikler\'e gönderildi');
    setTimeout(load, 800);
  } catch (e) { toast(String(e.message), 'err'); }
}

// Ctrl+Shift+T → toggle admin mode (for purge capability)
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.shiftKey && e.key === 'T') {
    e.preventDefault();
    const t = prompt('Admin token (boş bırakırsan çıkış):');
    if (t) { localStorage.setItem('adminToken', t); document.getElementById('trash-tab').style.display = ''; toast('Admin mod aktif'); }
    else { localStorage.removeItem('adminToken'); document.getElementById('trash-tab').style.display = 'none'; toast('Admin mod kapalı'); }
  }
});

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  tab = t.dataset.tab;
  if (tab === 'trash') { loadTrash(); return; }
  const inMissing = tab !== 'have';
  document.querySelectorAll('.controls select').forEach(el => {
    el.style.display = (inMissing && el.id !== 'type') ? 'none' : '';
  });
  document.getElementById('chips').style.display = inMissing ? 'none' : '';
  updateMeta();
  render();
});

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }
function cssEsc(s) { return String(s).replace(/[^a-z0-9_-]/gi, '_'); }

function toast(msg, kind = 'ok') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderColor = kind === 'err' ? '#c94d4d' : '#d4a849';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
}

async function copyPrompt(name) {
  const i = missing.items.find(x => x.name === name);
  if (!i?.prompt) return toast('Prompt yok', 'err');
  await navigator.clipboard.writeText(i.prompt);
  toast('Prompt kopyalandı');
}

function uploadFor(name) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/png,image/webp,image/gif,image/jpeg';
  inp.onchange = async () => {
    const file = inp.files[0]; if (!file) return;
    if (file.size > 20 * 1024 * 1024) return toast('20MB üstü kabul edilmiyor', 'err');
    toast('Yükleniyor…');
    const reader = new FileReader();
    reader.onload = async () => {
      const dataBase64 = String(reader.result).split(',')[1];
      try {
        const r = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, filename: file.name, dataBase64 }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || 'upload failed');
        toast('Yüklendi — waiting-for-review');
        setTimeout(load, 800);
      } catch (e) { toast(String(e.message), 'err'); }
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

async function reviewAction(name, action) {
  let reason;
  if (action === 'deny') {
    reason = prompt(`${name} — neden reddediyorsun?`);
    if (!reason) return;
  } else if (action === 'approve' && !confirm(`${name} — onaylansın mı?`)) return;
  else if (action === 'reopen' && !confirm(`${name} — incelemeye geri alınsın mı?`)) return;
  const prev = missing.items.find(i => i.name === name);
  const prevStatus = prev?.status, prevDenyReason = prev?.denyReason;
  try {
    const r = await fetch('/api/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, action, reason }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'review failed');
    recordAction({ type: 'review', name, prevStatus, prevDenyReason, label: action === 'approve' ? 'onay' : action === 'deny' ? 'red' : 'incele' });
    toast({ approve: 'Onaylandı', deny: 'Reddedildi', reopen: 'İncelemeye alındı' }[action]);
    setTimeout(load, 800);
  } catch (e) { toast(String(e.message), 'err'); }
}

function tryAnimate(img, name) {
  const item = missing.items.find(x => x.name === name);
  if (!item || item.type !== 'Animasyon') { img.nextElementSibling?.classList.add('hidden'); return; }
  const w = img.naturalWidth, h = img.naturalHeight;
  const dim = img.parentElement.querySelector('.dim');
  if (dim) dim.textContent = w + 'x' + h;
  // parse frame count from name
  const nm = (name.match(/_(\d+)f/i) || [])[1];
  let fr = nm ? +nm : 0, cols = 0, rows = 0;
  // detect layout: horizontal strip OR grid
  if (fr && w % (w/fr) === 0 && h === w/fr) { cols = fr; rows = 1; }
  else if (fr && w === h * fr) { cols = fr; rows = 1; }
  else if (fr === 6 && w === 1536 && h === 1024) { cols = 3; rows = 2; } // 2x3 grid
  else if (fr === 8 && w === 2048 && h === 1024) { cols = 4; rows = 2; }
  if (!cols || !rows) { img.nextElementSibling?.classList.add('hidden'); return; }
  const fw = w / cols, fh = h / rows;
  const holder = img.nextElementSibling;
  if (!holder) return;
  const display = 200;
  const scale = Math.min(display / fw, display / fh);
  const dw = Math.round(fw * scale), dh = Math.round(fh * scale);
  holder.style.cssText = `width:${dw}px;height:${dh}px;background-image:url('${img.src}');background-size:${Math.round(w*scale)}px ${Math.round(h*scale)}px;background-repeat:no-repeat;margin:8px auto 0;image-rendering:-webkit-optimize-contrast;`;
  img.style.display = 'none';
  let i = 0;
  clearInterval(holder._anim);
  holder._anim = setInterval(() => {
    const col = i % cols, row = Math.floor(i / cols);
    holder.style.backgroundPosition = `-${col*dw}px -${row*dh}px`;
    i = (i + 1) % (cols * rows);
  }, 125);
}

async function deleteAsset(file, dir) {
  if (!dir) return toast('Bu asset silinemez (dir yok)', 'err');
  if (!confirm(`${file} silinsin mi? (çöp kutusuna taşınır)`)) return;
  try {
    const r = await fetch('/api/asset-delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file, dir }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'delete failed');
    recordAction({ type: 'asset-delete', file, label: 'silme' });
    toast('Silindi (çöp kutusunda)');
    setTimeout(load, 800);
  } catch (e) { toast(String(e.message), 'err'); }
}

function recordAction(action) {
  lastAction = { ...action, at: Date.now() };
  updateUndoButton();
}

function updateUndoButton() {
  let el = document.getElementById('undo-btn');
  if (!el) {
    el = document.createElement('button');
    el.id = 'undo-btn';
    el.style.cssText = 'position:fixed;bottom:16px;right:16px;background:#d4a849;color:#1a1510;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600;z-index:200;transition:opacity .2s;box-shadow:0 2px 8px rgba(0,0,0,.4);';
    el.onclick = undoLastAction;
    document.body.appendChild(el);
  }
  const valid = lastAction && (Date.now() - lastAction.at) < 15000;
  if (valid) {
    el.textContent = `⟲ Geri Al (${lastAction.label})`;
    el.style.opacity = '1';
    el.style.cursor = 'pointer';
    el.disabled = false;
  } else {
    el.textContent = '⟲ Geri Al';
    el.style.opacity = '0.4';
    el.style.cursor = 'not-allowed';
    el.disabled = true;
  }
}

setInterval(updateUndoButton, 1000);

async function undoLastAction() {
  if (!lastAction || (Date.now() - lastAction.at) > 15000) return;
  const a = lastAction;
  const token = localStorage.getItem('adminToken') || '';
  try {
    if (a.type === 'asset-delete' || a.type === 'upload-delete') {
      const r = await fetch('/api/trash', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'restore', file: a.file }),
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error);
      // For upload-delete: also restore missing.json status + uploadedFile
      if (a.type === 'upload-delete' && a.itemName) {
        await fetch('/api/missing-patch', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: a.itemName, patch: { status: a.prevStatus || 'waiting-for-review', uploadedFile: a.file, denyReason: a.prevDenyReason || null } }),
        });
      }
    } else if (a.type === 'review') {
      // Revert to prev status
      const prev = a.prevStatus;
      let action;
      if (prev === 'waiting-for-review') action = 'reopen';
      else if (prev === 'approved') action = 'approve';
      else if (prev === 'denied') action = 'deny';
      else throw new Error('prev status revert not supported: ' + prev);
      const body = { name: a.name, action };
      if (action === 'deny') body.reason = a.prevDenyReason || 'restored by undo';
      const r = await fetch('/api/review', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error);
    } else if (a.type === 'clear') {
      throw new Error('Clear geri alınamaz — missing listesinden kalıcı silindi');
    } else {
      throw new Error('bilinmeyen action: ' + a.type);
    }
    toast('Geri alındı');
    lastAction = null;
    updateUndoButton();
    setTimeout(load, 800);
  } catch (e) { toast('Undo: ' + e.message, 'err'); }
}

async function loadTrash() {
  const token = localStorage.getItem('adminToken') || '';
  const isAdmin = !!token;
  try {
    const r = await fetch('/api/trash' + (token ? '?admin=' + encodeURIComponent(token) : ''), {
      headers: token ? { 'X-Admin-Token': token } : {},
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error);
    const g = document.getElementById('grid');
    const visibleFiles = j.files.filter(f => !f.name.endsWith('.meta.json'));
    if (!visibleFiles.length) { g.innerHTML = '<div class="empty">Çöp boş.</div>'; return; }
    g.innerHTML = visibleFiles.map(f => `
      <div class="miss">
        <h3>${f.name}</h3>
        <div class="notes">${fmtSize(f.size)}</div>
        <div class="actions">
          <button class="btn primary" onclick="restoreTrash(${JSON.stringify(f.name).replace(/"/g,'&quot;')})">Geri Yükle</button>
          ${isAdmin ? `<button class="btn danger" onclick="purgeTrash(${JSON.stringify(f.name).replace(/"/g,'&quot;')})">Kalıcı Sil</button>` : ''}
        </div>
      </div>`).join('');
  } catch (e) { toast('Trash: ' + e.message, 'err'); }
}

async function restoreTrash(file) {
  try {
    const r = await fetch('/api/trash', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'restore', file }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error);
    toast('Geri yüklendi');
    setTimeout(loadTrash, 500);
  } catch (e) { toast(e.message, 'err'); }
}

async function purgeTrash(file) {
  if (!confirm(`${file} kalıcı silinsin mi? (geri alınamaz)`)) return;
  const token = localStorage.getItem('adminToken') || '';
  try {
    const r = await fetch('/api/trash?admin=' + encodeURIComponent(token), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
      body: JSON.stringify({ action: 'purge', file }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error);
    toast('Kalıcı silindi');
    setTimeout(loadTrash, 500);
  } catch (e) { toast(e.message, 'err'); }
}

function jumpToAsset(name) {
  document.querySelector('.tab[data-tab="have"]').click();
  document.getElementById('q').value = '';
  filter.q = '';
  render();
  requestAnimationFrame(() => {
    const el = document.getElementById('asset-' + cssEsc(name));
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.transition = 'box-shadow .4s';
      el.style.boxShadow = '0 0 0 3px #d4a849';
      setTimeout(() => { el.style.boxShadow = ''; }, 2000);
    } else {
      toast('Asset listede bulunamadı — manifest yenilenmemiş olabilir', 'err');
    }
  });
}

async function clearEntry(name) {
  if (!confirm(`${name} — missing listesinden silinsin mi? (Asset dosyası Mevcut'ta kalır)`)) return;
  try {
    const r = await fetch('/api/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'clear failed');
    toast('Temizlendi');
    setTimeout(load, 800);
  } catch (e) { toast(String(e.message), 'err'); }
}

async function deleteUpload(name) {
  if (!confirm(`${name} upload'unu silmek istediğine emin misin?`)) return;
  try {
    const r = await fetch('/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'delete failed');
    const prev = missing.items.find(i => i.name === name);
    if (prev?.uploadedFile) recordAction({ type: 'upload-delete', file: prev.uploadedFile, itemName: prev.name, prevStatus: prev.status, prevDenyReason: prev.denyReason, label: 'silme' });
    toast('Silindi');
    setTimeout(load, 800);
  } catch (e) { toast(String(e.message), 'err'); }
}

function fmtSize(b) {
  if (!b) return '—';
  if (b < 1024) return b + 'B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + 'KB';
  return (b / 1024 / 1024).toFixed(2) + 'MB';
}

function openModal(id) {
  const i = data.items.find(x => x.id === id) || approvedAsAssets().find(x => x.id === id);
  if (!i) return;
  let previewInner = `<img src="${i.src}">`;
  if (i.type === 'Animasyon' && i.dim) {
    const m = i.dim.match(/^(\d+)x(\d+)$/);
    const nameFrames = (i.name.match(/_(\d+)f/i) || [])[1];
    if (m) {
      const w = +m[1], h = +m[2];
      const frames = nameFrames ? +nameFrames : (w > h ? Math.round(w / h) : 1);
      if (frames > 1 && w / h === frames) {
        const size = 256, endX = -((frames - 1) * size), dur = (frames / 8).toFixed(2);
        previewInner = `
          <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
            <div style="font-size:11px;color:#8b6b3d;">Oyun içi görünüm (${frames} frame @ 8 FPS)</div>
            <div style="width:${size}px;height:${size}px;background-image:url('${i.src}');background-repeat:no-repeat;background-size:auto 100%;animation:sprite-play ${dur}s steps(${frames-1}) infinite;--end:${endX}px;image-rendering:-webkit-optimize-contrast;"></div>
            <div style="font-size:11px;color:#8b6b3d;">Ham strip:</div>
            <img src="${i.src}" style="max-width:100%;">
          </div>`;
      }
    }
  }
  document.getElementById('box').innerHTML = `
    <div class="preview">${previewInner}</div>
    <div class="details">
      <h2>${i.name}</h2>
      <div class="row"><span class="k">Kategori</span><span>${i.category}</span></div>
      <div class="row"><span class="k">Tip</span><span>${i.type}</span></div>
      <div class="row"><span class="k">Tür</span><span>${i.kind}</span></div>
      <div class="row"><span class="k">Format</span><span>${i.ext.toUpperCase()}</span></div>
      <div class="row"><span class="k">Boyut</span><span>${i.dim || '—'}</span></div>
      <div class="row"><span class="k">Dosya</span><span>${fmtSize(i.size)}</span></div>
      <div class="row"><span class="k">Dosya adı</span><span style="word-break:break-all;">${i.file}</span></div>
      <div class="row"><span class="k">Güncellenme</span><span>${new Date(i.mtime).toLocaleDateString()}</span></div>
      <a class="dl" href="${i.src}" download="${i.file}">İndir (${i.ext.toUpperCase()})</a>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

document.getElementById('q').oninput = e => { filter.q = e.target.value; render(); };
document.getElementById('cat').onchange = e => { filter.cat = e.target.value; render(); };
document.getElementById('ext').onchange = e => { filter.ext = e.target.value; render(); };
document.getElementById('type').onchange = e => { filter.type = e.target.value; render(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

load();
</script>
